services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: g1
      POSTGRES_PASSWORD: g1pass
      POSTGRES_DB: g1db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g1 -d g1db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://g1:g1pass@db:5432/g1db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
