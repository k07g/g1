name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    test:
        name: Lint・Test・Coverage
        runs-on: ubuntu-latest

        steps:
            - name: リポジトリをチェックアウト
              uses: actions/checkout@v4

            - name: Go のセットアップ
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true

            # ---- コード品質 ----

            - name: go fmt チェック
              run: |
                  UNFORMATTED=$(gofmt -l .)
                  if [ -n "$UNFORMATTED" ]; then
                    echo "❌ フォーマットが必要なファイル:"
                    echo "$UNFORMATTED"
                    exit 1
                  fi

            - name: go vet
              run: go vet ./...

            # ---- テスト ----

            - name: テスト（race + coverage）
              run: go test ./... -v -race -count=1 -timeout 60s -coverprofile=coverage.out -covermode=atomic

            - name: カバレッジをコンソール表示
              run: go tool cover -func=coverage.out

            # ---- カバレッジレポート ----

            - name: カバレッジを Codecov にアップロード
              uses: codecov/codecov-action@v4
              with:
                  files: coverage.out
                  fail_ci_if_error: false

            - name: カバレッジサマリーをPRコメントに投稿
              uses: k1LoW/octocov-action@v1
              if: github.event_name == 'pull_request'
              continue-on-error: true

            # ---- ビルド確認 ----

            - name: ビルド
              run: go build ./cmd

    # ---- セキュリティスキャン（別ジョブ）----

    security:
        name: セキュリティスキャン
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true

            - name: govulncheck（脆弱性スキャン）
              run: |
                  go install golang.org/x/vuln/cmd/govulncheck@latest
                  govulncheck ./...
