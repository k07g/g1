name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---- ユニットテスト + カバレッジ ----
  test:
    name: Lint・Unit Test・Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: Go のセットアップ
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # ---- コード品質 ----

      - name: go fmt チェック
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ フォーマットが必要なファイル:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # ---- ユニットテスト ----

      - name: ユニットテスト（race + coverage）
        run: |
          UNIT_PKGS=$(go list ./... | grep -v '/e2e')
          go test $UNIT_PKGS -v -race -count=1 -timeout 60s \
            -coverprofile=coverage.out -covermode=atomic

      - name: カバレッジをコンソール表示
        run: go tool cover -func=coverage.out

      # ---- カバレッジレポート ----

      - name: カバレッジを Codecov にアップロード
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: octocov（カバレッジ・メトリクスレポート）
        uses: k1LoW/octocov-action@v1

      # ---- ビルド確認 ----

      - name: ビルド
        run: go build -o bin/server ./cmd

  # ---- E2Eテスト ----
  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: g1
          POSTGRES_PASSWORD: g1pass
          POSTGRES_DB: g1db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U g1 -d g1db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: Go のセットアップ
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: E2Eテスト
        env:
          DATABASE_URL: postgres://g1:g1pass@localhost:5432/g1db?sslmode=disable
        run: go test ./e2e/... -v -count=1 -timeout 60s

  # ---- セキュリティスキャン ----
  security:
    name: セキュリティスキャン
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck（脆弱性スキャン）
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...