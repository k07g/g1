name: 機能提案
description: 新機能や改善案を提案する
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。以下の項目を記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 背景・課題
      description: この提案の背景にある課題や動機を説明してください。
      placeholder: 「〜のときに〜が不便で...」
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更を想定しているかを記載してください。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した解決策があれば記載してください。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他、参考になる情報があれば記載してください。
    validations:
      required: false
